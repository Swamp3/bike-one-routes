<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>BikeOneRoutes – QR-Codes</title>
    <style>
      :root {
        --tile: 9cm;
        --qr: 6.4cm;
        --gap: 0.4cm;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #000;
      }

      body {
        padding: 1cm;
        background: #f5f5f5;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.8cm;
      }

      .toolbar button {
        padding: 0.5rem 1rem;
        font-size: 1rem;
        border: 1px solid #000;
        background: #000;
        color: #fff;
        border-radius: 6px;
        cursor: pointer;
      }

      .toolbar span {
        font-size: 0.9rem;
        color: #555;
      }

      .sheet {
        display: grid;
        grid-template-columns: repeat(2, var(--tile));
        gap: var(--gap);
        justify-content: center;
      }

      .tile {
        width: var(--tile);
        height: var(--tile);
        background: #fff;
        border: 1px solid #ccc;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 0.3cm;
        page-break-inside: avoid;
        break-inside: avoid;
      }

      .tile .qr {
        width: var(--qr);
        height: var(--qr);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .tile .qr svg,
      .tile .qr canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .tile .label {
        margin-top: 0.35cm;
        display: flex;
        align-items: center;
        gap: 0.25cm;
        color: #000;
        line-height: 1;
      }

      .tile .label .text {
        font-size: 11pt;
        font-weight: 600;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .tile .label .num {
        font-size: 22pt;
        font-weight: 700;
      }

      @page {
        size: A4;
        margin: 0.4cm;
      }

      @media print {
        body {
          padding: 0;
          background: #fff;
        }

        .toolbar {
          display: none;
        }

        .sheet {
          gap: var(--gap);
        }

        .tile {
          border: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button onclick="window.print()">Drucken</button>
      <span>6 × 9 cm × 9 cm QR-Codes – passt auf eine A4-Seite</span>
    </div>

    <div class="sheet" id="sheet"></div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script>
      const BASE_URL = "https://bike-one-routes.vercel.app/routes/";
      const ROUTE_NUMBERS = [1, 2, 3, 4, 5, 6];

      const sheet = document.getElementById("sheet");

      for (const n of ROUTE_NUMBERS) {
        const url = BASE_URL + n;

        const qr = qrcode(0, "H");
        qr.addData(url);
        qr.make();

        const svg = qr.createSvgTag({ cellSize: 8, margin: 0, scalable: true });

        const tile = document.createElement("div");
        tile.className = "tile";
        tile.innerHTML = `
          <div class="qr">${svg}</div>
          <div class="label">
            <span class="text">Route</span>
            <span class="num">${n}</span>
          </div>
        `;
        sheet.appendChild(tile);
      }
    </script>
  </body>
</html>
