# Merge this pattern into your Appwrite-generated docker-compose.yml so Traefik
# shares a network with Caddy. Replace `melmo_proxy` with your real network name
# (`docker network ls` on the host where Caddy runs).
#
# networks:
#   default:
#     name: melmo_proxy
#     external: true
#
# Then remove Traefik host port bindings (80/443) if Caddy already uses them.
